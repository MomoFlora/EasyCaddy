name: Build releases

on:
  schedule:
    - cron: "0 16 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  TZ: Asia/Shanghai

jobs:
  # =================================================================
  # 1. 检查更新状态
  # =================================================================
  check:
    name: 🔍 检查官方最新版本
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.getversion.outputs.tag }}
      ver: ${{ steps.getversion.outputs.ver }}
      triggered: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: 🌐 获取最新 Tag
        id: getversion
        run: |
          echo "========================================================="
          echo "▶️ 开始请求 GitHub API 获取版本信息..."
          echo "========================================================="
          
          ver=$(curl -sL https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name // ""')
          tag=$(curl -sL https://api.github.com/repos/caddyserver/caddy/releases/latest | jq -r '.tag_name // ""')
          
          if [[ -z "$tag" || "$tag" == "null" ]]; then
            echo "❌ 错误: 无法获取 Caddy 官方最新版本号，请检查网络或 API 限制。"
            exit 1
          fi
          
          echo "💡 官方最新版本号: ${tag}"
          echo "💡 当前仓库最新版本: ${ver}"
          echo "========================================================="
          
          echo "tag=${tag}" >> $GITHUB_OUTPUT
          echo "ver=${ver}" >> $GITHUB_OUTPUT
          
      - name: 🧹 清理历史工作流记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          retain_days: 1
          keep_minimum_runs: 3
      
  # =================================================================
  # 2. 多架构矩阵编译与发布
  # =================================================================
  build: 
    name: 🛠️ 编译架构 [${{ matrix.TARGET }}]
    needs: check
    if: ${{ needs.check.outputs.triggered == 'true' || (needs.check.outputs.tag != needs.check.outputs.ver) }}
    runs-on: ${{ matrix.OS }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - TARGET: amd64
            OS: ubuntu-latest
            ARCH: amd64
            OOS: linux
            DEB_ARCH: amd64
            
          - TARGET: arm64
            OS: ubuntu-latest
            ARCH: arm64
            OOS: linux
            DEB_ARCH: arm64
            
          - TARGET: mips
            OS: ubuntu-latest
            SOFT: softfloat
            ARCH: mips
            OOS: linux
            DEB_ARCH: mips
            
          - TARGET: mips64
            OS: ubuntu-latest
            SOFT: softfloat
            ARCH: mips64
            OOS: linux
            DEB_ARCH: mips64
            
          - TARGET: mips64le
            OS: ubuntu-latest
            SOFT: softfloat
            ARCH: mips64le
            OOS: linux
            DEB_ARCH: mips64el
            
          - TARGET: mipsel
            OS: ubuntu-latest
            SOFT: softfloat
            ARCH: mipsle
            OOS: linux
            DEB_ARCH: mipsel
            
          - TARGET: ppc64le
            OS: ubuntu-latest
            ARCH: ppc64le
            OOS: linux
            DEB_ARCH: ppc64el

          - TARGET: s390x
            OS: ubuntu-latest
            ARCH: s390x
            OOS: linux
            DEB_ARCH: s390x
            
          - TARGET: armv5
            OS: ubuntu-latest
            ARM: 5
            ARCH: arm
            OOS: linux
            DEB_ARCH: armel
            
          - TARGET: armv6
            OS: ubuntu-latest
            ARM: 6
            ARCH: arm
            OOS: linux
            DEB_ARCH: armhf

          - TARGET: armv7
            OS: ubuntu-latest
            ARM: 7
            ARCH: arm
            OOS: linux
            DEB_ARCH: armhf

          - TARGET: freebsd-x86-64
            OS: ubuntu-latest
            ARCH: amd64
            OOS: freebsd
            DEB_ARCH: ""
            
    env:
      TAG: ${{ needs.check.outputs.tag }}
      TARGET: ${{ matrix.TARGET }}
      OOS: ${{ matrix.OOS }}
      SOFT: ${{ matrix.SOFT }}
      ARM: ${{ matrix.ARM }}
      ARCH: ${{ matrix.ARCH }}
      DEB_ARCH: ${{ matrix.DEB_ARCH }}
      
    steps:
      - name: 📂 检查代码仓库
        uses: actions/checkout@v7

      - name: 🐹 动态获取最新 Go 版本
        id: go_version
        run: |
          latest_go=$(curl -sL https://golang.org/dl/?mode=json | jq -r '.[0].version' | sed 's/go//')
          echo "📦 检测到当前最新 Go 版本: go${latest_go}"
          echo "version=${latest_go}" >> $GITHUB_OUTPUT

      - name: ⚙️ 安装 Go 环境
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go_version.outputs.version }}
          cache: false

      - name: 🗜️ 安装 UPX 压缩工具
        uses: crazy-max/ghaction-upx@v4
        with:
          version: v4.2.4
          install-only: true
          
      - name: 🧪 源码准备与功能魔改
        run: |
          echo "========================================================="
          echo "▶️ 开始安装 xcaddy 核心工具..."
          go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
          
          echo "▶️ 开始克隆 Caddy 官方源码 [${{ env.TAG }}]..."
          git clone -b ${{ env.TAG }} https://github.com/caddyserver/caddy /opt/mycaddy
          
          echo "▶️ 开始下载并替换自定义 browse.html..."
          curl -sLko /opt/browse.html https://github.com/MomoFlora/EasyCaddy/raw/refs/heads/master/Caddy/browse.html
          cp -rf /opt/browse.html /opt/mycaddy/modules/caddyhttp/fileserver/browse.html
          
          echo "▶️ 开始执行源码参数优化与去耦微调..."
          sed -i 's/caddy\.Log().Warn("failed to set GOMAXPROCS", zap.Error(err))/runtime.GOMAXPROCS(4)/g' /opt/mycaddy/cmd/main.go
          sed -i 's/full += " " + module.Sum/full = module.Version/g' /opt/mycaddy/caddy.go
          sed -i 's/full += " => " + module.Replace.Path/full = module.Version/g' /opt/mycaddy/caddy.go
          sed -i 's/simple = module.Replace.Version + "_custom"/simple = module.Version/g' /opt/mycaddy/caddy.go
          sed -i 's/full += "@" + module.Replace.Version/full = module.Version/g' /opt/mycaddy/caddy.go
          sed -i 's/full += " " + module.Replace.Sum/full = module.Version/g' /opt/mycaddy/caddy.go
          echo "✅ 源码前置修改全部完成！"
          echo "========================================================="
          
      - name: 🔨 执行多架构编译
        run: |
          echo "========================================================="
          echo "▶️ 正在初始化编译目录与系统时区..."
          mkdir -p /opt/caddy && cd /opt/caddy
          sudo timedatectl set-timezone "Asia/Shanghai"
          
          echo "▶️ 开始交叉编译目标架构: GOOS=${{ env.OOS }} GOARCH=${{ env.ARCH }}"
          GOOS=${{ env.OOS }} GOARCH=${{ env.ARCH }} GOMIPS=${{ env.SOFT }} GOARM=${{ env.ARM }} xcaddy build \
            --with github.com/caddyserver/caddy/v2=/opt/mycaddy \
            --with github.com/mholt/caddy-webdav \
            --with github.com/aksdb/caddy-cgi/v2 \
            --with github.com/abiosoft/caddy-exec

          # 清理版本号前缀（去掉 v）
          VER_CLEAN="${TAG#v}"
          echo "🏷️  版本号: ${VER_CLEAN}"

          echo "========================================================="
          echo "📊 原始编译文件基本信息:"
          file caddy
          du -h caddy
          mv caddy caddy-${VER_CLEAN}-${{ env.TARGET }}
          echo "========================================================="

          # 针对特定兼容架构执行 UPX 固件高强度压缩
          if [[ "${{ env.TARGET }}" != "mips64" && "${{ env.TARGET }}" != "mips64le" && "${{ env.TARGET }}" != "s390x" && "${{ env.TARGET }}" != "freebsd-x86-64" ]]; then
            echo "▶️ 检测到目标架构符合压缩条件，启动 UPX 深度压缩..."
            cp caddy-${VER_CLEAN}-${{ env.TARGET }} caddy-${VER_CLEAN}-${{ env.TARGET }}-upx
            upx --lzma --best caddy-${VER_CLEAN}-${{ env.TARGET }}-upx
            echo "📊 压缩后文件体积:"
            du -h caddy-${VER_CLEAN}-${{ env.TARGET }}-upx
            echo "========================================================="
          fi
          
          echo "BUILD_TIME=$(date '+%Y年%m月%d日 %H:%M:%S')" >> $GITHUB_ENV

      - name: 📦 构建 DEB 安装包
        if: ${{ matrix.DEB_ARCH != '' }}
        run: |
          echo "========================================================="
          echo "▶️ 开始构建 DEB 安装包 (架构: ${{ env.DEB_ARCH }})..."
          echo "========================================================="

          VER="${{ env.TAG }}"
          VER_CLEAN="${VER#v}"
          PKG_DIR="/opt/caddy/deb-pkg"
          WORKSPACE="${{ github.workspace }}"

          # ---------- 创建 DEB 目录结构 ----------
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/etc/caddy"
          mkdir -p "${PKG_DIR}/lib/systemd/system"
          mkdir -p "${PKG_DIR}/usr/lib/sysusers.d"
          mkdir -p "${PKG_DIR}/usr/share/caddy"

          # 修复 DEBIAN 目录权限（dpkg-deb 要求 0755-0775）
          chmod 755 "${PKG_DIR}/DEBIAN"

          # ---------- 拷贝 caddy 二进制 ----------
          cp /opt/caddy/caddy-${VER_CLEAN}-${{ env.TARGET }} "${PKG_DIR}/usr/bin/caddy"
          chmod 755 "${PKG_DIR}/usr/bin/caddy"

          # ---------- 从仓库拷贝配置文件 ----------
          cp "${WORKSPACE}/Caddy/Caddyfile"            "${PKG_DIR}/etc/caddy/Caddyfile"
          cp "${WORKSPACE}/Caddy/caddy.service"        "${PKG_DIR}/lib/systemd/system/caddy.service"
          cp "${WORKSPACE}/Caddy/caddy-api.service"    "${PKG_DIR}/lib/systemd/system/caddy-api.service"
          cp "${WORKSPACE}/Caddy/caddy.sysusers"       "${PKG_DIR}/usr/lib/sysusers.d/caddy.conf"
          cp "${WORKSPACE}/Caddy/index.html"           "${PKG_DIR}/usr/share/caddy/index.html"

          echo "✅ 已从仓库拷贝配置文件: Caddyfile, caddy.service, caddy-api.service, caddy.sysusers, index.html"

          # ---------- 从仓库拷贝安装/卸载脚本 ----------
          cp "${WORKSPACE}/Scripts/postinstall.sh"     "${PKG_DIR}/DEBIAN/postinst"
          cp "${WORKSPACE}/Scripts/preremove.sh"       "${PKG_DIR}/DEBIAN/prerm"
          cp "${WORKSPACE}/Scripts/postremove.sh"      "${PKG_DIR}/DEBIAN/postrm"
          chmod 755 "${PKG_DIR}/DEBIAN/postinst" "${PKG_DIR}/DEBIAN/prerm" "${PKG_DIR}/DEBIAN/postrm"

          echo "✅ 已从仓库拷贝脚本: postinst, prerm, postrm"

          # ---------- 从仓库拷贝 control 控制文件 ----------
          cp "${WORKSPACE}/Scripts/control" "${PKG_DIR}/DEBIAN/control"
          sed -i "s/\${VER_CLEAN}/${VER_CLEAN}/g" "${PKG_DIR}/DEBIAN/control"
          sed -i "s/\${DEB_ARCH}/${{ env.DEB_ARCH }}/g" "${PKG_DIR}/DEBIAN/control"
          echo "✅ 已从仓库拷贝脚本: control"

          # ---------- 使用 dpkg-deb 打包 ----------
          DEB_NAME="caddy-${VER_CLEAN}-${{ env.DEB_ARCH }}.deb"
          dpkg-deb --build "${PKG_DIR}" "/opt/caddy/${DEB_NAME}"
          
          echo "========================================================="
          echo "📊 DEB 安装包信息:"
          ls -lh "/opt/caddy/${DEB_NAME}"
          dpkg-deb --info "/opt/caddy/${DEB_NAME}"
          echo "========================================================="
          
          echo "DEB_NAME=${DEB_NAME}" >> $GITHUB_ENV

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: caddy-${{ matrix.TARGET }}
          path: |
            /opt/caddy/caddy-*
          if-no-files-found: error

  # =================================================================
  # 3. 创建 Release + 构建 APT 仓库 (GPG 签名)
  # =================================================================
  create-release:
    name: 🚀 创建 Release & APT 仓库
    needs: [check, build]
    if: ${{ needs.check.outputs.triggered == 'true' || (needs.check.outputs.tag != needs.check.outputs.ver) }}
    runs-on: ubuntu-latest
    steps:
      - name: 📂 检查代码仓库
        uses: actions/checkout@v7

      - name: 📥 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: output
          merge-multiple: true

      - name: 📋 整理产物列表
        run: |
          echo "========================================================="
          echo "📊 待发布产物清单:"
          echo "========================================================="
          find output -type f | sort | while read f; do
            echo "  → $(basename "$f") ($(du -h "$f" | cut -f1))"
          done
          TOTAL_FILES=$(find output -type f | wc -l)
          TOTAL_SIZE=$(du -sh output | cut -f1)
          echo "📦 总计 ${TOTAL_FILES} 个文件，总大小 ${TOTAL_SIZE}"
          echo "========================================================="

      - name: 🔧 安装 APT 仓库构建工具
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev apt-utils gnupg

      - name: 🔑 准备 GPG 签名密钥
        id: gpg_setup
        run: |
          echo "========================================================="
          echo "▶️ 准备 GPG 签名密钥..."
          echo "========================================================="

          # 修复 GPG homedir 权限 (CI 环境必需)
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          find ~/.gnupg -type f -exec chmod 600 {} \; 2>/dev/null || true

          # gpg-agent.conf 只能写 agent 自身的选项
          cat > ~/.gnupg/gpg-agent.conf << 'AGENTCONF'
          allow-loopback-pinentry
          AGENTCONF

          # 清理残留 agent，确保干净启动
          gpgconf --kill all 2>/dev/null || true
          gpg-connect-agent /bye 2>/dev/null || true
          echo "✅ GPG 环境初始化完成"

          GPG_PUBLIC_KEY="${GITHUB_WORKSPACE}/output/caddy-archive-keyring.gpg"

          if [[ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]]; then
            # ===== 使用仓库预设的 GPG 密钥 =====
            echo "🔑 导入预设 GPG 私钥..."
            echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --pinentry-mode loopback --import 2>&1
            IMPORT_OK=$?

            FINGERPRINT=$(gpg --list-secret-keys --with-colons --keyid-format LONG 2>/dev/null | grep "^sec:" | head -1 | cut -d: -f5)

            if [[ ${IMPORT_OK} -ne 0 || -z "${FINGERPRINT}" ]]; then
              echo "❌ GPG 私钥导入失败! 请检查 GPG_PRIVATE_KEY 和 GPG_PASSPHRASE secret"
              exit 1
            fi
            echo "✅ GPG 私钥已导入 (指纹: ${FINGERPRINT})"

            # 导出公钥 (二进制 .gpg + ASCII .asc)
            gpg --export "${FINGERPRINT}" > "${GPG_PUBLIC_KEY}"
            gpg --export --armor "${FINGERPRINT}" > "${GITHUB_WORKSPACE}/output/caddy-archive-keyring.asc"
            echo "📤 公钥已导出"

            # 构建签名选项
            SIGN_OPTS="--batch --yes --pinentry-mode loopback --no-tty"
            if [[ -n "${{ secrets.GPG_PASSPHRASE }}" ]]; then
              SIGN_OPTS="${SIGN_OPTS} --passphrase ${{ secrets.GPG_PASSPHRASE }}"
              echo "🔐 已配置 passphrase"
            else
              echo "💡 未设置 GPG_PASSPHRASE (假设密钥无密码)"
            fi

          else
            # ===== 生成临时 GPG 密钥对 =====
            echo "⚠️  未检测到 GPG_PRIVATE_KEY，生成临时密钥..."
            echo "💡 建议: 在 Secrets 中设置 GPG_PRIVATE_KEY 以保持密钥一致性"

            gpg --batch --pinentry-mode loopback --no-tty --quick-generate-key \
              "EasyCaddy APT Repository <easycaddy@build.local>" \
              rsa4096 sign 2y

            FINGERPRINT=$(gpg --list-secret-keys --with-colons --keyid-format LONG 2>/dev/null | grep "^sec:" | head -1 | cut -d: -f5)

            if [[ -z "${FINGERPRINT}" ]]; then
              echo "❌ 临时 GPG 密钥生成失败!"
              exit 1
            fi
            echo "✅ 临时 GPG 密钥已生成 (指纹: ${FINGERPRINT})"

            gpg --export "${FINGERPRINT}" > "${GPG_PUBLIC_KEY}"
            gpg --export --armor "${FINGERPRINT}" > "${GITHUB_WORKSPACE}/output/caddy-archive-keyring.asc"
            echo "📤 公钥已导出"

            SIGN_OPTS="--batch --yes --pinentry-mode loopback --no-tty"
          fi

          echo "fingerprint=${FINGERPRINT}" >> $GITHUB_OUTPUT
          echo "sign_opts=${SIGN_OPTS}" >> $GITHUB_OUTPUT

      - name: 🏗️ 构建 APT 仓库
        run: |
          echo "========================================================="
          echo "▶️ 构建 APT 仓库..."
          echo "========================================================="

          VER="${{ needs.check.outputs.tag }}"
          VER_CLEAN="${VER#v}"
          cd output

          # ---------- 收集架构列表 ----------
          DEB_ARCH_LIST=""
          for deb in *.deb; do
            [[ -f "$deb" ]] || continue
            arch=$(dpkg-deb --info "$deb" 2>/dev/null | grep "^ Architecture:" | head -1 | awk '{print $2}')
            if [[ -n "$arch" ]]; then
              DEB_ARCH_LIST="${DEB_ARCH_LIST} ${arch}"
            fi
          done
          DEB_ARCH_LIST=$(echo "$DEB_ARCH_LIST" | tr ' ' '\n' | sort -u | tr '\n' ' ')
          echo "📋 检测到 DEB 架构: ${DEB_ARCH_LIST}"

          # ---------- 生成 Packages 索引 ----------
          echo "📝 生成 Packages 索引..."
          dpkg-scanpackages . /dev/null > Packages 2>/dev/null

          DEB_COUNT=$(grep -c "^Package:" Packages || echo "0")
          echo "   → ${DEB_COUNT} 个包"
          gzip -9c Packages > Packages.gz
          echo "✅ Packages + Packages.gz 已生成"

          # ---------- 生成 Release 文件 ----------
          echo "📝 生成 Release 索引文件..."
          cat > Release << RELEOF
          Origin: EasyCaddy
          Label: EasyCaddy APT Repository
          Suite: stable
          Codename: stable
          Version: ${VER_CLEAN}
          Architectures: ${DEB_ARCH_LIST}
          Components: main
          Description: EasyCaddy - Multi-architecture Caddy builds with bundled plugins
          Date: $(date -Ru)
          RELEOF

          # 用 apt-ftparchive 追加文件校验和
          apt-ftparchive release . >> Release
          echo "✅ Release 已生成"

          echo "========================================================="
          echo "📊 APT 仓库文件:"
          ls -lh InRelease Release Release.gpg Packages Packages.gz 2>/dev/null || true
          ls -lh *.deb | wc -l | xargs echo "DEB 包数量:"
          echo "========================================================="

      - name: ✍️ GPG 签名 Release 文件
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd output

          SIGN_OPTS='${{ steps.gpg_setup.outputs.sign_opts }}'

          if [[ -n "${{ steps.gpg_setup.outputs.fingerprint }}" ]]; then
            echo "✍️  签名 Release 文件..."
            echo "🔍 可用签名密钥:"
            gpg --list-secret-keys --keyid-format LONG

            # InRelease (内联签名)
            gpg ${SIGN_OPTS} --clearsign -o InRelease Release
            echo "✅ InRelease 已生成"

            # Release.gpg (分离签名)
            gpg ${SIGN_OPTS} --detach-sign --armor -o Release.gpg Release
            echo "✅ Release.gpg 已生成"
          else
            echo "⚠️  无 GPG 密钥，跳过签名"
          fi

          echo "========================================================="
          echo "📊 最终 APT 仓库文件:"
          ls -lh InRelease Release Release.gpg Packages Packages.gz *.deb caddy-archive-keyring.* 2>/dev/null || true
          echo "========================================================="

      - name: 🧹 清理空文件
        run: |
          echo "▶️ 清理空文件 (防止 GitHub API 拒绝 size=0)..."
          EMPTY_FILES=$(find output -type f -size 0 2>/dev/null)
          if [[ -n "$EMPTY_FILES" ]]; then
            echo "⚠️  发现空文件，正在删除:"
            echo "$EMPTY_FILES"
            find output -type f -size 0 -delete
          else
            echo "✅ 无空文件"
          fi
          find output -type d -empty -delete 2>/dev/null || true

          echo "📊 最终待发布文件清单:"
          find output -type f -size +0 | sort | while read f; do
            echo "  → ${f#output/} ($(du -h "$f" | cut -f1))"
          done
          TOTAL=$(find output -type f -size +0 | wc -l)
          echo "📦 总计 ${TOTAL} 个有效文件"

      - name: 📝 生成 Release Notes
        run: |
          BUILD_TIME=$(TZ=Asia/Shanghai date '+%Y年%m月%d日 %H:%M:%S')
          VER="${{ needs.check.outputs.tag }}"
          FINGERPRINT="${{ steps.gpg_setup.outputs.fingerprint }}"
          REPO="${{ github.repository }}"

          cat > /tmp/release-notes.md << 'RELEOF'
          ## 📥 Caddy 多架构自编译固件发布

          > 📌 **编译完成时间**：`__BUILD_TIME__`
          > 🏷️ **集成内核版本**：`__VER__`
          > 🔑 **GPG 指纹**：`__FINGERPRINT__`

          ---

          ### 🔑 APT 仓库安装 (推荐 · 带 GPG 验证)

          ```bash
          # 1. 下载并安装 GPG 密钥环
          curl -fsSL https://github.com/__REPO__/releases/latest/download/caddy-archive-keyring.gpg | \
            sudo tee /usr/share/keyrings/caddy-archive-keyring.gpg > /dev/null

          # 2. 添加 APT 源 (DEB822 格式)
          echo "Types: deb
          URIs: https://github.com/__REPO__/releases/latest/download/
          Suites: stable
          Components: main
          Signed-By: /usr/share/keyrings/caddy-archive-keyring.gpg" | \
            sudo tee /etc/apt/sources.list.d/caddy.sources

          # 3. 安装 Caddy
          sudo apt update
          sudo apt install caddy

          # 4. 启动服务
          sudo systemctl start caddy
          sudo systemctl enable caddy
          ```

          > 📖 **说明**: 本 APT 仓库的所有元数据与 deb 包均通过 GitHub Releases 直接提供。安装密钥环后，`apt update` 即可自动获取更新。

          ---

          ### 💡 文件说明
          - 带 `-upx` 后缀的固件为 **UPX (LZMA)** 深度压缩版，体积更小，适合嵌入式设备
          - 常规无后缀固件为原生编译版，执行效率最佳
          - `.deb` 安装包可直接通过 APT 或 `dpkg -i` 安装
          - `InRelease` / `Release.gpg` — GPG 签名文件，用于 APT 安全验证
          - `caddy-archive-keyring.gpg` — APT 公钥密钥环

          ### 🧩 本版集成扩展插件列表
          1. 📁 **[caddy-webdav](https://github.com/mholt/caddy-webdav)** — 全功能 WebDAV 服务端原生支持
          2. ⚙️ **[caddy-cgi](https://github.com/aksdb/caddy-cgi/v2)** — 传统 CGI 脚本/网关协议互联
          3. 🚀 **[caddy-exec](https://github.com/abiosoft/caddy-exec)** — 在特定的 Caddy 路由生命周期内一键执行外部系统指令

          ---

          #### 📦 手动 DEB 安装
          ```bash
          sudo dpkg -i caddy_*_<arch>.deb
          sudo systemctl start caddy
          sudo systemctl enable caddy
          ```

          #### 🔍 验证已集成的模块
          ```bash
          ./caddy list-modules -s
          ```

          📬 *有关于内核更迭的详细改动细节，请参阅 [Caddy 官方发布日志](https://github.com/caddyserver/caddy/releases)。*
